<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { width: 420px; padding: 16px; background: #1a1a2e; color: #e0e0e0; font-size: 13px; }
    h1 { font-size: 16px; margin-bottom: 6px; color: #4fc3f7; }
    .sub { font-size: 11px; color: #888; margin-bottom: 14px; }
    .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; }
    .status.ok { background: #1b5e2033; border: 1px solid #2e7d32; color: #66bb6a; }
    .status.warn { background: #e6510033; border: 1px solid #e65100; color: #ff9800; }
    .status.err { background: #b71c1c33; border: 1px solid #c62828; color: #ef5350; }
    .field { margin-bottom: 8px; }
    .field label { display: block; font-size: 11px; color: #999; margin-bottom: 2px; }
    .field textarea, .field input { width: 100%; background: #16213e; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; padding: 6px 8px; font-size: 11px; font-family: 'Courier New', monospace; }
    .field textarea { min-height: 36px; resize: vertical; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .row .field { flex: 1; margin-bottom: 0; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-primary { background: #1565c0; color: #fff; }
    .btn-primary:hover { background: #1976d2; }
    .btn-success { background: #2e7d32; color: #fff; }
    .btn-success:hover { background: #388e3c; }
    .btn-warn { background: #e65100; color: #fff; }
    .btn-warn:hover { background: #ef6c00; }
    .json-display { background: #0d1117; border: 1px solid #333; border-radius: 4px; padding: 8px; font-size: 10px; font-family: 'Courier New', monospace; color: #7ee787; white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; margin-top: 10px; }
    .copied { animation: flash 0.6s; }
    @keyframes flash { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    .detail { font-size: 10px; color: #666; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>🔑 DeepSeek Auth Exporter</h1>
  <div class="sub">Extract credentials for <code>deepseek-web-api-proxy</code></div>

  <div id="status" class="status warn">⏳ Loading...</div>

  <div class="btn-row">
    <button id="btnRefresh" class="btn-primary">🔄 Refresh from Tab</button>
    <button id="btnCopy" class="btn-success">📋 Copy JSON</button>
    <button id="btnSave" class="btn-warn">💾 Download File</button>
  </div>

  <div class="field" style="margin-top:12px">
    <label>Export Preview (deepseek-auth.json)</label>
    <div id="jsonPreview" class="json-display">{ "token": "…", "hif_dliq": "…", "hif_leim": "…", "cookie": "…" }</div>
  </div>

  <div class="detail" id="detail">No credentials captured yet</div>

  <script src="popup.js"></script>
</body>
</html>
